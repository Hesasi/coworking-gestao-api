services:
  postgres-db:
    image: postgres:16-alpine
    container_name: coworking-postgres-container
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: coworking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_coworking_data:/var/lib/postgresql/data

volumes:
  postgres_coworking_data: